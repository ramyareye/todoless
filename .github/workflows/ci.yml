name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install

      - name: Configure local env
        run: |
          cat > .dev.vars <<'ENVVARS'
          API_KEY_PEPPER=ci-test-secret-1234567890
          ENVIRONMENT=dev
          ENVVARS

      - name: Typecheck
        run: bun run typecheck

      - name: Apply local migrations
        run: bun run db:migrate:local

      - name: Start API server
        run: |
          nohup bun run dev > /tmp/todoless-dev.log 2>&1 &
          echo $! > /tmp/todoless-dev.pid

      - name: Wait for health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:8787/v1/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          cat /tmp/todoless-dev.log || true
          exit 1

      - name: Smoke test
        env:
          BASE_URL: http://localhost:8787
        run: bun run smoke

      - name: API behavior tests
        env:
          BASE_URL: http://localhost:8787
        run: bun run test:api

      - name: Stop API server
        if: always()
        run: |
          kill "$(cat /tmp/todoless-dev.pid)" || true
