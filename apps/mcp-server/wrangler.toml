name = "todoless-mcp-server"
main = "src/worker.mjs"
compatibility_date = "2026-02-07"
workers_dev = true
preview_urls = true

routes = [
  { pattern = "mcp.todoless.dev", zone_name = "todoless.dev", custom_domain = true }
]

[vars]
TODOLESS_API_BASE_URL = "https://todoless.dev"

[[services]]
binding = "TODOLESS_API"
service = "todoless-api"
environment = "production"
